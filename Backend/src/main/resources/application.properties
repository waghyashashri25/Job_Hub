server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/job_portal}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:mysecretkeymysecretkeymysecretkey123}
jwt.token-validity-ms=${JWT_TOKEN_VALIDITY_MS:3600000}

app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:3000}

# Optional external API credentials for aggregation
jobs.api.adzuna.app-id=${JOBS_API_ADZUNA_APP_ID:}
jobs.api.adzuna.app-key=${JOBS_API_ADZUNA_APP_KEY:}
jobs.api.jsearch.key=${JOBS_API_JSEARCH_KEY:}
jobs.api.usajobs.key=${JOBS_API_USAJOBS_KEY:}
jobs.api.usajobs.user-agent=${JOBS_API_USAJOBS_USER_AGENT:}

# Scheduler configuration
jobs.scheduler.enabled=${JOBS_SCHEDULER_ENABLED:true}
jobs.scheduler.fixed-rate-ms=${JOBS_SCHEDULER_FIXED_RATE_MS:600000}
