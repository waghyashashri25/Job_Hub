services:
  # Backend Service - Spring Boot REST API
  - type: web
    name: job-backend
    runtime: java
    runtimeVersion: "17"

    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar Backend/target/*.jar

    repo: https://github.com/waghyashashri25/Job_Hub.git
    branch: main
    rootDir: Backend

    plan: free

    envVars:
      - key: PORT
        value: 10000
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: validate
      - key: SPRING_JPA_SHOW_SQL
        value: "false"

      # Database Configuration (Update with your database URL)
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://your-db-host:5432/job_portal
        sync: false # Set this in Render dashboard
      - key: SPRING_DATASOURCE_USERNAME
        value: your_db_username
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        value: your_db_password
        sync: false

      # JWT Configuration
      - key: JWT_SECRET
        value: your_super_secret_jwt_key_minimum_32_characters
        sync: false
      - key: JWT_TOKEN_VALIDITY_MS
        value: "86400000" # 24 hours

      # CORS Configuration - Update with frontend URL
      - key: CORS_ALLOWED_ORIGINS
        value: https://job-frontend.onrender.com
        sync: false

      # Job Scheduler Configuration
      - key: JOBS_SCHEDULER_ENABLED
        value: "true"
      - key: JOBS_SCHEDULER_FIXED_RATE_MS
        value: "600000" # 10 minutes

      # Optional: External Job API credentials
      - key: JOBS_API_ADZUNA_APP_ID
        value: ""
        sync: false
      - key: JOBS_API_ADZUNA_APP_KEY
        value: ""
        sync: false

  # Frontend Service - React Static Site
  - type: static_site
    name: job-frontend

    buildCommand: npm install && npm run build
    publishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://job-backend.onrender.com/api
      - key: REACT_APP_ENVIRONMENT
        value: production
      - key: REACT_APP_ENABLE_ANALYTICS
        value: "false"

    repo: https://github.com/waghyashashri25/Job_Hub.git
    branch: main
    rootDir: Frontend

    plan: free
    autoDeployOnPush: true
